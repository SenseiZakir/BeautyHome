<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Карточка товара</title>
  <link rel="stylesheet" href="css/style3.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="back-btn">← Назад</a>
  <div class="logo">Beauty Home</div>
</header>

<main class="product-page">

  <!-- HERO / ЗАГОЛОВОК -->
  <div class="product-hero">
    <h1>Банкетки</h1>
    <p class="price">15 000 - 17 000 сом</p>
  </div>

  <!-- ГАЛЕРЕЯ -->
  <div class="product-gallery">

    <!-- ГЛАВНАЯ КАРТИНКА -->
    <div class="main-image">
      <img
        src="images/Банкетки/Банкетка 1.jpg"
        alt="Банкетка"
        id="mainImage"
      >
    </div>

    <!-- МИНИАТЮРЫ -->
    <div class="thumbnails">
      <img src="images/Банкетки/Банкетка 1.jpg" alt="Банкетка 1">
      <img src="images/Банкетки/Банкетка 2.jpg" alt="Банкетка 2">
      <img src="images/Банкетки/Банкетка 3.jpg" alt="Банкетка 3">
      <img src="images/Банкетки/Банкетка 4.jpg" alt="Банкетка 4">
      <img src="images/Банкетки/Банкетка 5.jpg" alt="Банкетка 5">
      <img src="images/Банкетки/Банкетка 6.jpg" alt="Банкетка 6">
    </div>

  </div>

  <!-- ОПИСАНИЕ -->
  <div class="product-info">

    <p class="description">
      Мягкий современный диван для гостиной
    </p>

    <ul>
      <li>Материал: </li>
      <li>Каркас: ЛДСП</li>
      <li>Стиль: Современный</li>
      <li>Цвет: На выбор</li>
      <li>Гарантия: 12 месяцев</li>
      <li>Страна: Кыргызстан</li>
    </ul>

    <button id="addToCartBtn">
  Добавить в корзину
</button>

    <a
      href="https://wa.me/996XXXXXXXXX"
      target="_blank"
      class="whatsapp-btn"
    >
      Заказать в WhatsApp
    </a>

  </div>

</main>

<script src="js/products.js"></script>
<script src="js/product.js"></script>

</body>
</html>
