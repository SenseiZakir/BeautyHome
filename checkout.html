<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Оформление заказа</title>
  <link rel="stylesheet" href="css/style2.css">
</head>

<body>

  <header class="header">

  <a href="index.html" class="logo-wrap homeLink">
    <img src="images/Logo.png" alt="Beauty Home" class="logo-img">
    <span class="logo">Beauty Home</span>
  </a>

  <div class="search-box">
    <input
      type="text"
      class="search"
      id="headerSearch"
      placeholder="Поиск мебели..."
    >
    <button id="searchBtn" class="search-btn">🔍</button>
  </div>

  <nav class="nav">
    <a href="index.html" class="nav-link homeLink">Главная</a>
    <a href="index.html#catalog" class="nav-link">Каталог</a>
    <a href="checkout.html" class="nav-link">Корзина</a>
    <a href="services.html" class="nav-link">Услуги</a>
    <a href="delivery.html" class="nav-link">Доставка</a>
    <a href="contacts.html" class="nav-link">Контакты</a>
  </nav>

  <div class="header-right">
    <a href="tel:+996555123456" class="phone-header">
      📞 +996 555 123 456
    </a>
  </div>

</header>

<a href="index.html" class="back-btn">← На главную</a>

<h1>Оформление заказа</h1>

<div class="order-box">

  <!-- КОРЗИНА -->
  <h3>Ваш заказ</h3>
  <ul id="cartItems"></ul>

  <button class="clear-btn" onclick="clearCart()">Очистить корзину</button>

  <!-- ИТОГО -->
  <p>
    Итого:
    <input id="totalPrice" type="number" value="0">
    сом
  </p>

</div>

<!-- ФОРМА -->
<form id="orderForm" class="order-form">

  <h3>Данные получателя</h3>

  <input type="text" placeholder="Ваше имя" required>

  <input type="tel" placeholder="Номер телефона" required>

  <input type="text" placeholder="Город / адрес доставки" required>

  <textarea placeholder="Комментарий (необязательно)"></textarea>

  <button type="submit">Подтвердить заказ</button>

</form>

<!-- РЕЗУЛЬТАТ -->
<div id="result"></div>


<!-- ОПЛАТА -->
<div class="order-box">

  <h3>Оплата</h3>

  <button onclick="pay()">Оплатить картой</button>

</div>

<div id="paymentResult"></div>

<script src="js/products.js"></script>
<script src="js/main.js"></script>

<script src="js/checkout.js"></script>

</body>
</html>
